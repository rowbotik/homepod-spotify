version: '3.8'

services:
  raspotify:
    image: dtcooper/raspotify:latest
    container_name: raspotify
    restart: unless-stopped
    environment:
      - DEVICE_NAME=${DEVICE_NAME:-HomePod Spotify}
      - BITRATE=${BITRATE:-320}
      - BACKEND_NAME=pipe
      - DEVICE=/tmp/spotify_fifo
      - INITIAL_VOLUME=100
    volumes:
      - ~/homepod-spotify/pipe:/tmp
    devices:
      - /dev/null:/dev/null  # Dummy device since we use pipe output
    networks:
      - spotify-bridge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  owntone:
    image: lscr.io/linuxserver/daapd:latest
    container_name: owntone
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/homepod-spotify/pipe:/music/fifo:ro
      - ~/homepod-spotify/config:/var/cache/owntone
    # Note: Using host network for proper AirPlay/mDNS discovery
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  spotify-bridge:
    driver: bridge
