version: '3.8'

services:
  raspotify:
    image: derkades/raspotify:latest
    container_name: raspotify
    restart: unless-stopped
    network_mode: host
    environment:
      - SPOTIFY_NAME=${DEVICE_NAME:-HomePod Spotify}
    devices:
      - /dev/snd:/dev/snd
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  owntone:
    image: lscr.io/linuxserver/daapd:latest
    container_name: owntone
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ~/homepod-spotify/pipe:/music/fifo:ro
      - ~/homepod-spotify/config:/var/cache/owntone
    # Note: Using host network for proper AirPlay/mDNS discovery
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  spotify-bridge:
    driver: bridge
